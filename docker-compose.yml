services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: quantumos
      POSTGRES_PASSWORD: quantumos
      POSTGRES_DB: quantumos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantumos"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: os_image/docker/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://quantumos:quantumos@postgres:5432/quantumos
      DEFAULT_TENANT_ID: tenant_demo
      QUANTUMOS_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./skills:/app/skills:ro

  dashboard:
    build:
      context: .
      dockerfile: os_image/docker/Dockerfile.dashboard
    ports:
      - "5173:80"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - api

volumes:
  postgres_data:
