# Default: single QOS service (embedded Postgres when DATABASE_URL unset).
# For dedicated Postgres: deploy docker-compose.railway.yml instead.

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"

# Do NOT set DATABASE_URL to ${{Postgres.DATABASE_URL}} unless a Postgres plugin exists.
# Optional plain variables:
#   QUANTUMOS_ENV = production
#   DEFAULT_TENANT_ID = tenant_demo
# Recommended volume mount: /data/postgres (embedded Postgres persistence)
