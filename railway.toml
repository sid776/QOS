# Default service config when Railway builds from repo root (API).
# For the dashboard, create a second Railway service and set Dockerfile path to Dockerfile.dashboard

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"

# Required variables on the QOS service (set in Railway dashboard):
#   DATABASE_URL = ${{Postgres.DATABASE_URL}}   (reference from Postgres plugin)
#   QUANTUMOS_ENV = production
#   DEFAULT_TENANT_ID = tenant_demo
