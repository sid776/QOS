name: qrng_demo
version: 0.2.0
type: quantum_demo
description: Generate cryptographically strong random bytes with entropy analysis — demo uses OS CSPRNG; connect a QRNG provider for hardware randomness.
default_job_type: quantum_demo
category: Randomness
icon: "🎲"
result_view: entropy
features:
  - Configurable byte length
  - Hex and binary preview
  - Shannon entropy estimate per byte
input_fields:
  - name: bytes
    type: number
    label: Random bytes
    min: 1
    max: 256
    default: 16
    help: Each byte = 8 bits of randomness
